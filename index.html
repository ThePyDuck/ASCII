<!DOCTYPE html>
<html>
<head>
<title>SoomaptoGIFs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#0f172a;
font-family:'Poppins',sans-serif;
overflow:hidden;
}

/* animated gradient background */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:linear-gradient(60deg,#00d4ff,#7c3aed,#ff006e,#00d4ff);
background-size:400% 400%;
animation:bg 15s linear infinite;
opacity:0.25;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* glass card */

.container{
position:relative;
text-align:center;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* fancy title */

.title{
font-size:80px;
color:white;
letter-spacing:4px;
text-shadow:
0 0 10px #00d4ff,
0 0 20px #7c3aed,
0 0 40px #ff006e;
animation:fade 2s ease;
margin-bottom:30px;
}

@keyframes fade{
0%{
opacity:0;
transform:translateY(40px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

/* Bongobondhu image */

img{
width:180px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<div class="container">

<div class="title">SoomaptoGIFs</div>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTtxiHWwG1TLv6u3Tss2-kB9C5Reqg8qyHL0BcK3AG6Hw&s=10">

</div>

</body>

</html>
