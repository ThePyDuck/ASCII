<!DOCTYPE html>
<html>
<head>
<title>SoomaptoGIFs</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:Arial, sans-serif;
overflow:hidden;
}

/* animated gradient background */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:linear-gradient(45deg,#00f2ff,#7b00ff,#ff0077,#00f2ff);
background-size:400% 400%;
animation:bgmove 12s linear infinite;
opacity:0.25;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* fancy text */
.title{
position:relative;
font-size:70px;
font-weight:bold;
letter-spacing:4px;
color:white;
text-shadow:
0 0 10px #00f2ff,
0 0 20px #7b00ff,
0 0 40px #ff0077;
animation:fade 2s ease;
}

/* text animation */
@keyframes fade{
0%{
opacity:0;
transform:translateY(40px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="title">SoomaptoGIFs</div>

</body>
</html>
