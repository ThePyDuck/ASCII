<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 4.6 Agentic File System</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #00d1b2; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        #sidebar { width: 280px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .status-badge { padding: 8px; border-radius: 4px; background: #2c2c2c; font-size: 0.8rem; margin-bottom: 20px; border: 1px solid #444; }
        #file-list { font-size: 0.85rem; color: #aaa; overflow-y: auto; }
        .log-entry { margin-bottom: 8px; border-left: 2px solid var(--accent); padding-left: 8px; animation: fadeIn 0.3s; }

        /* Chat Area */
        #main { flex: 1; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .ai { align-self: flex-start; background: #333; border: 1px solid #444; }

        .input-box { padding: 20px; background: var(--panel); display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #loginBtn { background: #f39c12; color: white; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="sidebar">
    <button id="loginBtn">?? Authenticate Puter</button>
    <div class="status-badge" id="status">Status: Offline</div>
    <div style="font-weight: bold; margin-bottom: 10px; font-size: 0.9rem;">FILE SYSTEM LOGS:</div>
    <div id="file-list">No actions yet...</div>
</div>

<div id="main">
    <div id="chat-window">
        <div class="bubble ai">I am Claude 4.6. Click the orange button to login, then ask me to create files or folders!</div>
    </div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="e.g., 'Make a folder called Games'..." disabled>
        <button id="sendBtn" disabled>SEND</button>
    </div>
</div>

<script>
    const statusEl = document.getElementById('status');
    const loginBtn = document.getElementById('loginBtn');
    const fileList = document.getElementById('file-list');
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // --- AGENTIC TOOLS ---
    const myTools = [
        {
            name: "create_directory",
            description: "Creates a new folder in your Puter cloud storage.",
            parameters: { type: "object", properties: { path: { type: "string" } } },
            execute: async (args) => {
                await puter.fs.mkdir(args.path);
                addLog(`Created Directory: ${args.path}`);
                return `Success: Directory '${args.path}' created.`;
            }
        },
        {
            name: "write_file",
            description: "Creates a file with content.",
            parameters: { type: "object", properties: { path: { type: "string" }, content: { type: "string" } } },
            execute: async (args) => {
                await puter.fs.write(args.path, args.content);
                addLog(`Wrote File: ${args.path}`);
                return `Success: File '${args.path}' saved.`;
            }
        }
    ];

    // --- AUTHENTICATION HANDLER ---
    loginBtn.onclick = async () => {
        try {
            loginBtn.innerText = "Connecting...";
            await puter.auth.signIn(); // Explicitly trigger the popup
            statusEl.innerText = "Status: Online (Connected)";
            statusEl.style.color = "var(--accent)";
            loginBtn.style.display = "none";
            userInput.disabled = false;
            sendBtn.disabled = false;
        } catch (err) {
            loginBtn.innerText = "Retry Login";
            alert("Login Failed: " + err.message);
        }
    };

    async function handleChat() {
        const text = userInput.value;
        if(!text) return;

        appendBubble('user', text);
        userInput.value = '';
        
        try {
            // Using Claude Opus 4.6 (Frontier Model)
            const response = await puter.ai.chat(text, {
                model: 'claude-opus-4-6',
                tools: myTools
            });

            appendBubble('ai', response.message.content[0].text || "Task handled.");
        } catch (err) {
            appendBubble('ai', "System Error: " + err.message);
        }
    }

    function addLog(msg) {
        if(fileList.innerText.includes("No actions")) fileList.innerHTML = "";
        const div = document.createElement('div');
        div.className = "log-entry";
        div.innerText = msg;
        fileList.prepend(div);
    }

    function appendBubble(role, text) {
        const b = document.createElement('div');
        b.className = `bubble ${role}`;
        b.innerText = text;
        chatWindow.appendChild(b);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    sendBtn.onclick = handleChat;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };
</script>

</body>
</html>
